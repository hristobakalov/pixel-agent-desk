<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office PiP</title>
  <link rel="stylesheet" href="/public/pip.css">
</head>

<body>
  <!-- Titlebar (always visible, drag region) -->
  <div class="pip-titlebar">
    <span class="pip-title-label">Office</span>
    <div class="pip-controls">
      <button class="pip-ctrl-btn" id="pipMinBtn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button class="pip-ctrl-btn" id="pipExpandBtn" title="Back to dashboard">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5"/><polyline points="5,1.5 1.5,1.5 1.5,5"/></svg>
      </button>
      <button class="pip-ctrl-btn pip-ctrl-close" id="pipCloseBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="pip-canvas-wrap">
    <canvas id="office-canvas"></canvas>
  </div>

  <!-- Office Engine Scripts (same as dashboard.html) -->
  <script src="/src/office/office-config.js?v=3"></script>
  <script src="/src/office/office-layers.js?v=3"></script>
  <script src="/src/office/office-coords.js?v=3"></script>
  <script src="/src/office/office-pathfinder.js?v=3"></script>
  <script src="/src/office/office-sprite.js?v=3"></script>
  <script src="/src/office/office-character.js?v=3"></script>
  <script src="/src/office/office-renderer.js?v=3"></script>
  <script src="/src/office/office-ui.js?v=3"></script>
  <script src="/src/office/office-init.js?v=3"></script>

  <!-- PiP Logic -->
  <script src="/public/pip.js"></script>
</body>

</html>
